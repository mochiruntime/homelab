---
- name: Create
  hosts: localhost
  connection: local
  gather_facts: false
  no_log: "{{ molecule_no_log }}"
  tasks:
    - name: Ensure virtualbox_WSL2 plugin is installed on WSL
      block:
        - name: Check if running on WSL
          ansible.builtin.stat:
            path: /proc/sys/fs/binfmt_misc/WSLInterop
          register: wsl_check

        - name: Check installed vagrant plugins
          ansible.builtin.command: vagrant plugin list
          register: vagrant_plugins
          changed_when: false
          when: wsl_check.stat.exists

        - name: Install virtualbox_WSL2 plugin
          ansible.builtin.command: vagrant plugin install virtualbox_WSL2
          when:
            - wsl_check.stat.exists
            - "'virtualbox_WSL2' not in vagrant_plugins.stdout"
      ignore_errors: true # Don't fail the whole test if plugin install fails

    - name: Create molecule instance(s) # noqa fqcn[action]
      vagrant:
        instances: "{{ molecule_yml.platforms }}"
        default_box: "{{ molecule_yml.driver.default_box | default('bento/ubuntu-24.04') }}"
        provider_name: "{{ molecule_yml.driver.provider.name | default(omit, true) }}"
        provision: "{{ molecule_yml.driver.provision | default(omit) }}"
        cachier: "{{ molecule_yml.driver.cachier | default(omit) }}"
        parallel: "{{ molecule_yml.driver.parallel | default(omit) }}"
        state: up
      register: server
      no_log: false

    # Mandatory configuration for Molecule to function.

    - name: Create molecule instances configuration
      when: server is changed # noqa no-handler
      block:
        - name: Populate instance config dict
          ansible.builtin.set_fact:
            instance_conf_dict:
              {
                "instance": "{{ item.Host }}",
                "address": "{{ item.HostName }}",
                "user": "{{ item.User }}",
                "port": "{{ item.Port }}",
                "identity_file": "{{ item.IdentityFile }}",
              }
          with_items: "{{ server.results }}"
          register: instance_config_dict

        - name: Convert instance config dict to a list
          ansible.builtin.set_fact:
            instance_conf: "{{ instance_config_dict.results | map(attribute='ansible_facts.instance_conf_dict') | list }}"

        - name: Dump instance config
          ansible.builtin.copy:
            content: "{{ instance_conf | to_json | from_json | to_yaml }}"
            dest: "{{ molecule_instance_config }}"
            mode: "0600"
