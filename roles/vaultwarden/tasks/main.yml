---
# tasks file for vaultwarden
- name: Assert port binding permissions
  block:
    - name: Get unprivileged_port_start sysctl
      ansible.builtin.command: cat /proc/sys/net/ipv4/ip_unprivileged_port_start
      register: vaultwarden_sysctl_port_start
      changed_when: false
      failed_when: false

    - name: Verify privileged port binding
      ansible.builtin.assert:
        that:
          - (vaultwarden_bind_port | int) >= (vaultwarden_sysctl_port_start.stdout | default(1024) | int)
        fail_msg: >
          Binding to port {{ vaultwarden_bind_port }} is not allowed in rootless mode.
          The host's net.ipv4.ip_unprivileged_port_start is set to {{ vaultwarden_sysctl_port_start.stdout | default(1024) }}.
          Please use a higher port or configure the host to allow binding to privileged ports.
      when: vaultwarden_sysctl_port_start.rc == 0
- name: Get vaultwarden user UID
  ansible.builtin.getent:
    database: passwd
    key: "{{ vaultwarden_user }}"

- name: Set vaultwarden UID fact
  ansible.builtin.set_fact:
    vaultwarden_uid: "{{ getent_passwd[vaultwarden_user][1] }}"

- name: Ensure directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vaultwarden_user }}"
    group: "{{ vaultwarden_user }}"
    mode: '0700'
  loop:
    - "{{ vaultwarden_data_dir }}"

- name: Deploy vaultwarden quadlet
  ansible.builtin.template:
    src: vaultwarden.container.j2
    dest: "/home/{{ vaultwarden_user }}/.config/containers/systemd/vaultwarden.container"
    owner: "{{ vaultwarden_user }}"
    group: "{{ vaultwarden_user }}"
    mode: '0644'
  notify:
    - Reload user systemd
    - Restart vaultwarden

- name: Ensure vaultwarden service is started and enabled
  ansible.builtin.systemd:
    name: vaultwarden.service
    state: started
    enabled: true
    scope: user
    daemon_reload: true
  become: true
  become_user: "{{ vaultwarden_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ vaultwarden_uid }}"
