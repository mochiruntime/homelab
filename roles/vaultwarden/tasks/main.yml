---
# tasks file for vaultwarden
- name: Ensure vaultwarden user exists
  ansible.builtin.user:
    name: "{{ vaultwarden_user }}"
    shell: /bin/bash
    state: present

- name: Get vaultwarden user UID
  ansible.builtin.getent:
    database: passwd
    key: "{{ vaultwarden_user }}"

- name: Set vaultwarden UID fact
  ansible.builtin.set_fact:
    vaultwarden_uid: "{{ getent_passwd[vaultwarden_user][1] }}"

- name: Enable lingering for vaultwarden user
  ansible.builtin.command: "loginctl enable-linger {{ vaultwarden_user }}"
  args:
    creates: "/var/lib/systemd/linger/{{ vaultwarden_user }}"

- name: Ensure directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vaultwarden_user }}"
    group: "{{ vaultwarden_user }}"
    mode: '0700'
  loop:
    - "{{ vaultwarden_data_dir }}"
    - "/home/{{ vaultwarden_user }}/.config/containers/systemd"

- name: Deploy vaultwarden quadlet
  ansible.builtin.template:
    src: vaultwarden.container.j2
    dest: "/home/{{ vaultwarden_user }}/.config/containers/systemd/vaultwarden.container"
    owner: "{{ vaultwarden_user }}"
    group: "{{ vaultwarden_user }}"
    mode: '0644'
  notify:
    - Reload user systemd
    - Restart vaultwarden

- name: Ensure vaultwarden service is started and enabled
  ansible.builtin.systemd:
    name: vaultwarden.service
    state: started
    enabled: true
    scope: user
    daemon_reload: true
  become: true
  become_user: "{{ vaultwarden_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ vaultwarden_uid }}"
