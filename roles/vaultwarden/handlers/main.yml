---
# handlers file for vaultwarden
- name: Reload user systemd
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  become: true
  become_user: "{{ vaultwarden_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ vaultwarden_uid }}"

- name: Restart vaultwarden
  ansible.builtin.systemd:
    name: vaultwarden.service
    state: restarted
    scope: user
  become: true
  become_user: "{{ vaultwarden_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ vaultwarden_uid }}"
