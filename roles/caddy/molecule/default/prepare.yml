---
- name: Prepare
  hosts: all
  become: true
  tasks:
    - name: Set unprivileged port start to 80
      ansible.posix.sysctl:
        name: net.ipv4.ip_unprivileged_port_start
        value: '80'
        state: present
        sysctl_set: true

    - name: Install Podman
      ansible.builtin.include_role:
        name: podman

    - name: Ensure podman users exist
      ansible.builtin.include_role:
        name: podman_user
      vars:
        podman_user_list:
          - services_user

    - name: Create caddy_network
      ansible.builtin.include_role:
        name: podman_network
      vars:
        podman_network_list:
          - name: caddy_network
            user: services_user

    - name: Get services_user UID
      ansible.builtin.getent:
        database: passwd
        key: services_user

    - name: Set services_user UID fact
      ansible.builtin.set_fact:
        echo_user_uid: "{{ getent_passwd['services_user'][1] }}"

    - name: Deploy http-echo quadlet
      ansible.builtin.copy:
        dest: "/home/services_user/.config/containers/systemd/http-echo.container"
        content: |
          [Container]
          ContainerName=http-echo
          Image=docker.io/hashicorp/http-echo:latest
          Exec=-text="hello from http-echo" -listen=:5678
          Network=caddy_network
          
          [Service]
          Restart=always
          
          [Install]
          WantedBy=default.target
        owner: services_user
        group: services_user
        mode: '0644'

    - name: Start http-echo service
      ansible.builtin.systemd:
        name: http-echo.service
        state: started
        enabled: true
        scope: user
        daemon_reload: true
      become: true
      become_user: services_user
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ echo_user_uid }}"
