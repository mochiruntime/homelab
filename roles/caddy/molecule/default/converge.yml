---
- name: Converge
  hosts: all
  become: true
  tasks:
    - name: Include caddy role
      ansible.builtin.include_role:
        name: caddy
      vars:
        caddy_user: services_user
        caddy_network: caddy_network
        caddy_sites:
          - domain: ":80"
            proxy: "http-echo:5678"
