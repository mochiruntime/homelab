---
argument_specs:
  main:
    short_description: "Manage rootless Podman networks via systemd Quadlets."
    options:
      podman_network_list:
        type: list
        elements: dict
        required: true
        options:
          name:
            type: str
            required: true
            description: "The name of the Podman network."
          user:
            type: str
            required: true
            description: "The system user (rootless) who will own the network."
          state:
            type: str
            default: "present"
            choices: ["present", "absent"]
            description: "Whether the network should be created or destroyed."
          internal:
            type: bool
            default: false
            description: "If true, isolates the network from external access."
          subnet:
            type: str
            description: "Custom subnet for the network (e.g., '10.89.2.0/24')."
          gateway:
            type: str
            description: "Custom gateway for the network."
          labels:
            type: list
            elements: str
            description: "List of labels to apply to the network (e.g., 'app=proxy')."
