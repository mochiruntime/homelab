---
# defaults file for roles/ubuntu_hardening

ubuntu_hardening_defaults:
  # SSH Configuration
  ssh:
    enabled: true
    port: 22
    permit_root_login: "no"
    password_authentication: "no"
    allow_groups: []
    allow_users: []
    modern_algorithms:
      ciphers:
        - "chacha20-poly1305@openssh.com"
        - "aes256-gcm@openssh.com"
        - "aes128-gcm@openssh.com"
      macs:
        - "hmac-sha2-512-etm@openssh.com"
        - "hmac-sha2-256-etm@openssh.com"
        - "umac-128-etm@openssh.com"
      kex:
        - "curve25519-sha256@libssh.org"
    authentication_methods: "publickey"
    allow_tcp_forwarding: "no"
    permit_tunnel: "no"
    host_based_authentication: "no"
    gssapi_authentication: "no"
    permit_user_environment: "no"
    max_startups: "10:30:60"
    ignore_rhosts: "yes"
    allow_agent_forwarding: "no"

  # Firewall Configuration
  firewall:
    enabled: true
    default_incoming_policy: "deny"
    allow_ports: []
    ssh_access:
      enabled: true
      rules:
        - source_ip: 0.0.0.0

  # System Hardening
  system:
    upgrade_type: dist
    package_removal:
      enabled: true
      packages:
        - telnet
        - rsh-client
        - rlogin
        - rcp
        - talk
        - nis
        - yp-tools
    unattended_upgrades:
      enabled: true
      mail: ""
      remove_unused: true
      automatic_reboot_with_users: true
    auditd:
      enabled: true
      apply_rules: true
    aide:
      enabled: false
      init: false

  # Network (Sysctl)
  network:
    ipv6:
      enabled: true
      disable_at_boot: false
    sysctl:
      enabled: true
      params:
        # IP Spoofing protection
        - name: net.ipv4.conf.all.rp_filter
          value: 1
        - name: net.ipv4.conf.default.rp_filter
          value: 1
        # Ignore ICMP broadcast requests
        - name: net.ipv4.icmp_echo_ignore_broadcasts
          value: 1
        # Disable source packet routing
        - name: net.ipv4.conf.all.accept_source_route
          value: 0
        - name: net.ipv6.conf.all.accept_source_route
          value: 0
        - name: net.ipv4.conf.default.accept_source_route
          value: 0
        - name: net.ipv6.conf.default.accept_source_route
          value: 0
        # Ignore send redirects
        - name: net.ipv4.conf.all.send_redirects
          value: 0
        - name: net.ipv4.conf.default.send_redirects
          value: 0
        # Ignore ICMP redirects
        - name: net.ipv4.conf.all.accept_redirects
          value: 0
        - name: net.ipv4.conf.default.accept_redirects
          value: 0
        - name: net.ipv6.conf.all.accept_redirects
          value: 0
        - name: net.ipv6.conf.default.accept_redirects
          value: 0
        # Log Martians
        - name: net.ipv4.conf.all.log_martians
          value: 1
        - name: net.ipv4.conf.default.log_martians
          value: 1
        # Additional Kernel & Network Hardening
        - name: kernel.randomize_va_space
          value: 2
        - name: kernel.kptr_restrict
          value: 2
        - name: kernel.dmesg_restrict
          value: 1
        - name: kernel.unprivileged_bpf_disabled
          value: 1
        - name: net.ipv4.tcp_syncookies
          value: 1
        - name: net.ipv4.icmp_ignore_bogus_error_responses
          value: 1

  # Filesystem Hardening
  filesystem:
    hardening:
      enabled: true
      shm_noexec: true
      tmpfs_tmp: false
    sensitive_files:
      enabled: true

  # Account Policy
  account:
    password_aging:
      enabled: false
      max_days: 90
      min_days: 7
      warn_age: 7
    root_check:
      enabled: true
    sudo_password_required:
      enabled: true
    pam:
      pwquality:
        enabled: true
        minlen: 11
        dcredit: -1
        ucredit: -1
        ocredit: -1
        lcredit: -1
        maxrepeat: 3
      faillock:
        enabled: false
        deny: 5
        unlock_time: 900
        exempt_users: []
      password_history:
        enabled: false
        remember: 5
      restrict_su:
        enabled: true
        group: sudo
