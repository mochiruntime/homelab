---
- name: Ensure SSH configuration directory exists
  ansible.builtin.file:
    path: /etc/ssh
    state: directory
    mode: '0755'
  when: ubuntu_hardening.ssh.enabled

- name: Apply hardened sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0600'
    validate: "/usr/sbin/sshd -t -f %s"
  notify: restart ssh
  when: ubuntu_hardening.ssh.enabled

- name: Ensure SSH is enabled and running
  ansible.builtin.service:
    name: ssh
    state: started
    enabled: yes
  when: ubuntu_hardening.ssh.enabled
