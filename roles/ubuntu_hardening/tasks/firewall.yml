---
- name: Ensure SSH port is allowed before enabling UFW
  ansible.builtin.assert:
    that:
      - >
        (not ubuntu_hardening.firewall.ssh_access.enabled and
         ubuntu_hardening.firewall.allow_ports | selectattr('port', 'equalto', ubuntu_hardening.ssh.port) | list | length > 0) or
        (ubuntu_hardening.firewall.ssh_access.enabled and
         ubuntu_hardening.firewall.ssh_access.rules | length > 0)
    fail_msg: "SSH port is not allowed in UFW rules – aborting to prevent lockout"
  when: ubuntu_hardening.firewall.enabled

- name: Set UFW default policies
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - direction: incoming
      policy: "{{ ubuntu_hardening.firewall.default_incoming_policy }}"
    - direction: outgoing
      policy: allow
    - direction: routed
      policy: deny
  when: ubuntu_hardening.firewall.enabled

- name: Allow specified ports in UFW
  community.general.ufw:
    rule: allow
    port: "{{ item.port | string }}"
    proto: "{{ item.proto | default('tcp') }}"
  loop: "{{ ubuntu_hardening.firewall.allow_ports }}"
  when:
    - ubuntu_hardening.firewall.enabled
    - not (ubuntu_hardening.firewall.ssh_access.enabled and
      (item.port | string == ubuntu_hardening.ssh.port | string))

- name: Allow restricted SSH access in UFW
  community.general.ufw:
    rule: allow
    port: "{{ ubuntu_hardening.ssh.port | string }}"
    proto: tcp
    from_ip: "{{ item.source_ip | default('any') }}"
    to_ip: "{{ item.dest_ip | default('any') }}"
    interface: "{{ item.interface | default(omit) }}"
    direction: "in"
  loop: "{{ ubuntu_hardening.firewall.ssh_access.rules }}"
  when: ubuntu_hardening.firewall.ssh_access.enabled

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: ubuntu_hardening.firewall.enabled

- name: Remove legacy Fail2ban SSH jail disable file
  ansible.builtin.file:
    path: /etc/fail2ban/jail.d/00-disable-default.conf
    state: absent
  notify: restart fail2ban
  when: ubuntu_hardening.firewall.enabled

- name: Configure Fail2ban for SSH
  ansible.builtin.copy:
    content: |
      [sshd]
      enabled = true
      port = {{ ubuntu_hardening.ssh.port }}
      filter = sshd
      logpath = /var/log/auth.log
      maxretry = 3
      bantime = 1h
    dest: /etc/fail2ban/jail.d/ssh.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart fail2ban
  when: ubuntu_hardening.firewall.enabled
