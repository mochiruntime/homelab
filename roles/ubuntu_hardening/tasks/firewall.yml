---
- name: Set UFW default policies
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - direction: incoming
      policy: "{{ ubuntu_hardening.firewall.default_incoming_policy }}"
    - direction: outgoing
      policy: allow
    - direction: routed
      policy: deny

- name: Allow specified ports in UFW
  community.general.ufw:
    rule: allow
    port: "{{ item.port | string }}"
    proto: "{{ item.proto | default('tcp') }}"
  loop: "{{ ubuntu_hardening.firewall.allow_ports }}"

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: ubuntu_hardening.firewall.enabled

- name: Configure Fail2ban for SSH
  ansible.builtin.copy:
    content: |
      [sshd]
      enabled = true
      port = {{ ubuntu_hardening.ssh.port }}
      filter = sshd
      logpath = /var/log/auth.log
      maxretry = 3
      bantime = 1h
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: restart fail2ban
